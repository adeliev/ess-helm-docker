# Element Call - call.deliev.net
# Proxies to Docker container on port 8093

# HTTP/2 Connection upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name call.deliev.net;

    access_log /var/log/nginx/call.deliev.net.log;
    error_log /var/log/nginx/call.deliev.net.errors;

    # SSL Configuration - wildcard certificate
    ssl_certificate /etc/letsencrypt/live/deliev.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deliev.net/privkey.pem;

    # TLSv1.2 is required for iOS support
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_dhparam /etc/nginx/dhparam.pem;
    ssl_session_cache shared:le_nginx_SSL:10m;
    ssl_session_timeout 1440m;
    ssl_session_tickets off;
    ssl_buffer_size 4k;

    add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains; preload' always;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;

    # Proxy to Element Call
    location / {
        proxy_pass http://127.0.0.1:8093;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # WebSocket support (for real-time communication)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Long-lived connections for calls
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }
}

# HTTP redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name call.deliev.net;
    return 301 https://$host$request_uri;
}
