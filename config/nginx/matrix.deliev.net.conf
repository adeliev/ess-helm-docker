# Synapse Homeserver - matrix.deliev.net
# Proxies to Docker container on port 8008

# HTTP/2 Connection upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name matrix.deliev.net;

    access_log /var/log/nginx/matrix.deliev.net.log;
    error_log /var/log/nginx/matrix.deliev.net.errors;

    # SSL Configuration - wildcard certificate
    ssl_certificate /etc/letsencrypt/live/deliev.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deliev.net/privkey.pem;

    # TLSv1.2 is required for iOS support
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_dhparam /etc/nginx/dhparam.pem;
    ssl_session_cache shared:le_nginx_SSL:10m;
    ssl_session_timeout 1440m;
    ssl_session_tickets off;
    ssl_buffer_size 4k;

    add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains; preload' always;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;

    # Federation endpoint
    location /.well-known/matrix/server {
        return 200 '{"m.server": "matrix.deliev.net:443"}';
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    # Client discovery
    location /.well-known/matrix/client {
        return 200 '{"m.homeserver": {"base_url": "https://matrix.deliev.net"}}';
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
    }

    # Proxy to Synapse
    location / {
        proxy_pass http://127.0.0.1:8008;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # File upload support (for media)
        client_max_body_size 50M;
        client_body_buffer_size 50M;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Long-lived connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }
}

# HTTP redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name matrix.deliev.net;
    return 301 https://$host$request_uri;
}

# Federation port (8448)
server {
    listen 8448 ssl;
    listen [::]:8448 ssl;
    http2 on;

    server_name matrix.deliev.net;

    # SSL Configuration - same as above
    ssl_certificate /etc/letsencrypt/live/deliev.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deliev.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_dhparam /etc/nginx/dhparam.pem;
    ssl_session_cache shared:le_nginx_SSL:10m;
    ssl_session_timeout 1440m;
    ssl_session_tickets off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:8008;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        client_max_body_size 50M;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }
}
